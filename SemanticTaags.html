 <iframe width="560" height="315" src="https://www.youtube.com/embed/17rpWFkH2Bo?si=0m3gMY35WsXlPNip&autoplay&1"

 <section id="registration">
     <form >
        <fieldset>
        <legend><strong>Registration Form</strong></legend><br>
        <label for="">Name</label><br>
        <input type="text" 
        pattern="[A-Za-z]{3,30}]"
        placeholder="Enter name"
        required
        title="name must be alphabets and can include spaces"><br><br>
        <label for="">Age</label><br>
        <input type="number" min="18" max="60"><br><br>
        <label for="">Email</label><br>
        <input type="email"
        pattern="[a-z0-9,_%+-]+@[a-z0-9,-]+\.[a-z{2,}$]"
        title="email should include @ "><br><br>
        <label for="">Phone Number</label><br>
        <input type="tel"
        pattern="[6-9][0-9]{9}"
        title="number must be 10 digits"><br><br>
        <label for="">Password</label><br>
        <input type="password"
        pattern="(?=.*[A-Z])(?=.*[a-z])(?=.*\d)(?=.*[@#$^&%+=!]).{8,}"
        title="password must contain 8 digits ,upper,lower,digits"><br><br>
        <button type="submit">Submit</button>
        <button type="reset">Reset</button>
        </fieldset>
        </form><br>
