<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="random.html" method="get">
        <fieldset>
    <legend>REGISTRATION FORM</legend>
    <label for="">Name: </label>
        <input type="text" placeholder="Enter your name" required><br>
        <br>
        <label for="" >Age: </label>
        <input type="number" min="1" max="100" step="2"><br>
        <br>
        <label for="">City</label>
        <input type="text"><br><br>
        <label for="">Date</label>
        <input type="date"><br><br>
        <label for="">Email:</label>
        <input type="email"><br>
        <br>
        <label for="">Gender</label>
        <input type="radio" id="male" value="Male" name="gender">
        <label for="male">Male</label>
        <input type="radio" id="female" value="Female" name="gender">
        <label for="female">Female</label><br><br>
        <label for="">Experience</label>
        <input type="range" min="0" max="10"><br><br>
        <label for="">Upload your CV</label><br>
        <input type="file"><br><br>
        <label for="">Time</label>
        <input type="time"><br><br>
        <label for="">Month</label>
        <input type="month"><br><br>
        <label for="">Week</label>
        <input type="week"><br><br>
        <label for="">Cover Letter</label><br>
        <textarea name="" id=""></textarea>
        <br><br>
        <label for="">Choose the TechStack</label>
        <select name="" id="">
            <option value="">Java</option>
            <option value="">Python</option>
            <option value="">MERN</option>
        </select><br><br>
        <button type="submit">Submit</button>
        <button type="reset">Reset</button>
        </fieldset>
    </form>
</body>
</html>
