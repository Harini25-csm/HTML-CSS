<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .ball{
            width: 80px;
            height: 80px;
            border: 5px solid orange;
            transition: all 1s ease;
        }
        .ball:hover{
            background:green ;
            transform: rotate(240deg) scale(2.6);
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <div class="ball"></div>
</body>
</html>
