<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            text-align: center;
            font-family: Arial, sans-serif;

        }
        .container{
            border: 12px solid black;
            display:grid;
            background-color: rgb(248, 244, 244);
            grid-template-columns: repeat(2,1fr);
            gap:15px;
            padding: 20px;
            width:600px;
            height:400px;
            margin-left: 280px;
        }
        .box{
            background-color: gray;
            color:white;
            font-size: 25px;
            padding: 40px;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <h2>CSS Grid Layout</h2>
    <div class="container">
        <div class="box">A</div>
        <div class="box">B</div>
        <div class="box">C</div>
        <div class="box">D</div>
        <div class="box">E</div>
        <div class="box">F</div>
    </div>
</body>
</html>
