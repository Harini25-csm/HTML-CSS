<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>scrolling</h1>
    <marquee behavior="" direction="">default direction</marquee>
    <h1>alternate movement</h1>
    <marquee behavior="alternate" direction="" scrollamount="17">bouncing movement</marquee>
    <h1>fast</h1>
    <marquee scrollamount="30" behavior="" direction="">fast scrolling</marquee>
    <h1>Right to left</h1>
    <marquee behavior="" direction="right">right to left</marquee>
    <h1>upward scrolling</h1>
    <marquee behavior="" direction="up" height="80">html</br>css</br>js</br>break</marquee>
    <h1>background color</h1>
    <marquee behavior="" direction="" bgcolor="yellow">colour</marquee>
    <h1>loop</h1>
    <marquee behavior="" direction="" loop="3">moves only3 times</marquee>
    <h1>image scrolling</h1>
    <marquee behavior="" direction="right"><img src="/banana.jpg" alt="image" height="30"></marquee>
    <h1>downward scrolling</h1>
    <marquee behavior="" direction="down" height="80">html</br>css</br>js</br>break</marquee>

</body>
</html>
