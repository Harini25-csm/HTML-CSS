<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="marque.html" method="get">
        <fieldset>
        <legend>Student Form</legend>
        <label for="">Name: </label>
        <input type="text" placeholder="Enter your name" required><br>
        <br>
        <label for="" >Age: </label>
        <input type="number" min="1" max="100" step="1"><br>
        <br>
        <label for="">Email:</label>
        <input type="email"><br>
        <br>
        <label for="">Password:</label>
        <input type="password"><br>
        <br>
        <label for="">Branch</label><br>
        <input type="radio" id="aiml" value="AIML" name="branch">
        <label for="aiml">AIML</label><br>
        <input type="radio" value="AI" name="branch" id="ai">

        <label for="ai">AI</label><br>
        <input type="radio" value="DS" name="branch" id="ds">
        
        <label for="ds">DS</label>
        <br><br>
        <label for="">Skills</label><br>
        <input type="checkbox">
        <label for="">Java</label><br>
        <input type="checkbox">

        <label for="">Python</label><br>
        <input type="checkbox">
        
        <label for="">JS</label><br>
        <br>
        <label for="">Gender  </label>
        <select name="gender" id="">
            <option value="male">Male</option>
            <option value="female">Female</option>
        </select><br><br>
        <textarea name="" id="">Comments</textarea>
        
        <br><br>
        <button type="submit">Submit</button>
        <button type="reset">Reset</button>
        </fieldset>
    </form>
</body>
</html>
