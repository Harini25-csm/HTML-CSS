<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="random.html" method="get">
        <label for=""><strong>Registration Form</strong></label><br><br>
        <label for="">Name</label><br>
        <input type="text" 
        pattern="[A-Za-z]{3,30}]"
        placeholder="Enter name"
        required
        title="name must be alphabets and can include spaces"><br><br>
        <label for="">Age</label><br>
        <input type="number" min="18" max="60"><br><br>
        <label for="">Email</label><br>
        <input type="email"
        pattern="[a-z0-9,_%+-]+@[a-z0-9,-]+\.[a-z{2,}$]"
        title="email should include @ "><br><br>
        <label for="">Phone Number</label><br>
        <input type="tel"
        pattern="[6-9][0-9]{9}"
        title="number must be 10 digits"><br><br>
        <label for="">Password</label><br>
        <input type="password"
        pattern="(?=.*[A-Z])(?=.*[a-z])(?=.*\d)(?=.*[@#$^&%+=!]).{8,}"
        title="password must contain 8 digits ,upper,lower,digits"><br><br>
        <button type="submit">Submit</button>
        <button type="reset">Reset</button>
        

    </form>
</body>
</html>
