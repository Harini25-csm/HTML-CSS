<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            margin:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#222;
            perspective:800px;
        }
        .box{
            width:150px;
            height: 150px;
            animation: move 3s infinite linear;
            background: orange;
        }
        @keyframes move{
            0%{
                transform:rotateX(0deg) rotateY(0deg) translateZ(0px);
            }
            25%{
                transform:rotateX(180deg) translateZ(120px);
            }
            50%{
                transform:rotateY(150deg) translateZ(150px);
            }
            75%{
                transform:rotateX(360deg) rotateY(360deg) translateZ(-120px);
            }
            100%{
                transform:rotateX(0deg) rotateY(0deg) translateZ(0px);
            }
        }
    </style>
</head>
<body>
    <div class="box"></div>
</body>
</html>
